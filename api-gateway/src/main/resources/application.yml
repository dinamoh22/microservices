server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: employees-service
              uri: lb://employees-service
              predicates:
                - Path=/api/employees/**
              filters:
                - StripPrefix=1

            - id: departments-service
              uri: lb://departments-service
              predicates:
                - Path=/api/departments/**
              filters:
                - StripPrefix=1

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: ${JWT_SECRET}