server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          # auth-service: POST /api/auth/** → lb://auth-service/auth/**
          # RewritePath strips /api and rewrites to /auth/...
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/auth/**
            filters:
              - RewritePath=/api/auth/(?<segment>.*), /auth/${segment}

          # employees-service: /api/employees/** → lb://employees-service/employees/**
          - id: employees-service
            uri: lb://employees-service
            predicates:
              - Path=/api/employees/**
            filters:
              - StripPrefix=1

          # departments-service: /api/departments/** → lb://departments-service/departments/**
          - id: departments-service
            uri: lb://departments-service
            predicates:
              - Path=/api/departments/**
            filters:
              - StripPrefix=1

security:
  jwt:
    secret: y1b8BBBktwnZu4/e934Hmb/BUWiGkweZ4h8JIA8v/f8=

# Eureka Service Discovery
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
