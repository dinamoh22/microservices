spring.application.name=employees-service
server.port=8082

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:3306/employees-db
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

security.jwt.secret=${JWT_SECRET}
security.jwt.secret.issuer=swer-soa
security.jwt.secret.access-token-minutes=15
security.jwt.secret.refresh-token-days=7

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

services.departments.base-url=http://localhost:8082

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
